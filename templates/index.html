<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduKit - Selamat Datang</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap");

      :root {
        --bg-dark: #0f172a;
        --card-bg: rgba(255, 255, 255, 0.05);
        --primary-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
        --glow-color: rgba(16, 185, 129, 0.4);
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Poppins", sans-serif;
        background: radial-gradient(circle at top right, #1e3a8a, #0f172a 60%);
        color: #f8fafc;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }

      .container {
        text-align: center;
        width: 90%;
        max-width: 420px;
        padding: 40px 30px;
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .logo-wrapper {
        background: rgba(255, 255, 255, 0.1);
        width: 80px;
        height: 80px;
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 20px auto;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .logo-placeholder {
        width: 45px;
        height: 45px;
        object-fit: contain;
      }

      h1 {
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 10px;
        letter-spacing: 0.5px;
        background: linear-gradient(to right, #fff, #94a3b8);
        -webkit-background-clip: text;
        background-clip: text; /* ✅ Diperbaiki */
        -webkit-text-fill-color: transparent;
      }

      .subtitle {
        font-size: 0.9rem;
        color: #94a3b8;
        margin-bottom: 35px;
        font-weight: 300;
      }

      .button-group {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .btn {
        background: var(--primary-gradient);
        color: white;
        text-decoration: none;
        padding: 16px 24px;
        border-radius: 16px;
        font-size: 1rem;
        font-weight: 600;
        border: none;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      .btn::after {
        content: "→";
        font-size: 1.2rem;
        transition: transform 0.3s ease;
        opacity: 0.7;
      }

      .btn:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px var(--glow-color);
        filter: brightness(1.1);
      }

      .btn:hover::after {
        transform: translateX(5px);
        opacity: 1;
      }

      .btn-blue {
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        --glow-color: rgba(59, 130, 246, 0.4);
      }

      .btn-purple {
        background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
        --glow-color: rgba(139, 92, 246, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-wrapper">
        <img
          src="https://cdn-icons-png.flaticon.com/512/1162/1162456.png"
          alt="Logo EduKit"
          class="logo-placeholder"
        />
      </div>

      <h1>EduKit Dashboard</h1>
      <p class="subtitle">Silakan pilih modul pembelajaran Anda</p>

      <div class="button-group">
        <a href="/arduino" class="btn btn-blue">Arduino</a>

       

        <a href="/ultrasonic" class="btn btn-purple">Ultrasonik Sensor</a>
      </div>
    </div>
  </body>
</html>
